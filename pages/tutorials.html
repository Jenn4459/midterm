<!DOCTYPE html>
<html lang="en">
<!-- HEADER -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            display: grid;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .grid {
            border: 5px solid #000;
            background-color: rgb(220, 164, 164);
            width: 100%;
            padding: 5px 0 5px 0px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        div {
            text-align: center;
            justify-content: center;
        }

        .cell {
            width: 50%;
            margin: 20px auto;
            border: 1px solid #000;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
        }

        .button {
            border: 1px solid #000;
            background-color: rgb(166, 216, 166);
            width: 200px;
            padding: 10px;
            margin: 10px auto;
            border-radius: 10px;
        }

        .image {
            width: 100px;
            height: auto;
            margin-top: 10px auto;
        }

        .descrip {
            width: 90%;
            text-align: center;
            padding: 10px;
            margin: 10px auto;
            margin-bottom: 10px;
            line-height: 1.5;
        }
    </style>
</head>
<!-- HEADER -->

<body>
    <h1 class="head">Our Tutorials</h1>
    <div id="grid"></div>
    <script src="tutorials.js"></script>
</body>

</html>
